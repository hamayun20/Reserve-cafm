services:
  app:
    build:
      context: .
      dockerfile: dockerfile
    ports:
      - "3003:3003"
    environment:
      DATABASE_URL: postgresql://reserve_cafm:reserve_cafm_password@db:5432/reserve_cafm?schema=public
      NEXT_PUBLIC_APP_NAME: Reserve CAFM
      PORT: 3003
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: reserve_cafm
      POSTGRES_USER: reserve_cafm
      POSTGRES_PASSWORD: reserve_cafm_password
    volumes:
      - reserve_cafm_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reserve_cafm -d reserve_cafm"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
volumes:
  reserve_cafm_postgres:
